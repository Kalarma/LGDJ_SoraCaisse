<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Caisse — Les Gentlemen du Jeu</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0b0d11;
    --surface: #15181f;
    --surface-hover: #1c2029;
    --border: #262a35;
    --text: #f0f2f5;
    --muted: #8a919e;
    --primary: #4a9fd4; 
    --tcg: #ff7e5f;
    --jds: #feb47b;
    --acc: #a18cd1;
    --puz: #4facfe;
    --cash: #4ade80;
    --card: #60a5fa;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    margin: 0; padding: 2rem; line-height: 1.6;
  }

  .container { max-width: 1200px; margin: 0 auto; }

  header { 
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 3rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;
  }

  h1 { font-size: 1.8rem; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
  .brand { color: var(--primary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.2em; display: block; }

  /* Upload Zone */
  .upload-zone {
    border: 2px dashed var(--border);
    padding: 3rem; text-align: center; border-radius: 20px;
    background: var(--surface); cursor: pointer; transition: 0.3s; margin-bottom: 2rem;
  }
  .upload-zone:hover { border-color: var(--primary); background: var(--surface-hover); }

  /* Stats Bar */
  .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { background: var(--surface); padding: 1.25rem; border-radius: 16px; border: 1px solid var(--border); }
  .stat-label { color: var(--muted); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-bottom: 0.5rem; }
  .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; font-weight: 600; }

  /* Breakdown Chart (Pure CSS) */
  .breakdown-container {
    background: var(--surface); padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 2rem;
  }
  .progress-stack { display: flex; height: 12px; border-radius: 6px; overflow: hidden; background: var(--border); margin: 1.5rem 0; }
  .progress-bar { height: 100%; transition: width 0.5s ease; }
  .legend { display: flex; gap: 1.5rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }

  /* Tickets Display */
  .ticket-card {
    background: var(--surface); border-radius: 12px; border: 1px solid var(--border);
    margin-bottom: 1rem; overflow: hidden;
  }
  .ticket-header {
    padding: 0.75rem 1.25rem; background: rgba(255,255,255,0.03);
    display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .ticket-body { padding: 1rem 1.25rem; }
  .item-row { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 0.25rem 0; }
  .item-ref { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; width: 120px; }
  .item-name { flex-grow: 1; }
  
  .badge {
    padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
  }
  .badge-cb { background: rgba(96, 165, 250, 0.2); color: var(--card); border: 1px solid var(--card); }
  .badge-cash { background: rgba(74, 222, 128, 0.2); color: var(--cash); border: 1px solid var(--cash); }

  .hidden { display: none; }
  .text-primary { color: var(--primary); }
</style>
</head>
<body>

<div class="container">
  <header>
    <div>
      <span class="brand">Outil Analyse Journal</span>
      <h1>Les Gentlemen du Jeu</h1>
    </div>
    <div id="dateRange" style="text-align: right; color: var(--muted); font-size: 0.8rem;"></div>
  </header>
  
  <div class="upload-zone" id="dropZone">
    <p>Glissez le PDF ici ou cliquez pour parcourir</p>
    <input type="file" id="fileInput" class="hidden" accept=".pdf">
  </div>

  <div id="results" class="hidden">
    <div class="dashboard">
      <div class="stat-card">
        <div class="stat-label">Total CB (TTC)</div>
        <div id="totalCB" class="stat-value text-primary">0,00 €</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Espèces</div>
        <div id="totalCash" class="stat-value" style="color: var(--cash)">0,00 €</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">CA Global TTC</div>
        <div id="totalGlobal" class="stat-value">0,00 €</div>
      </div>
    </div>

    <div class="breakdown-container">
      <div class="stat-label">Répartition du Chiffre d'Affaires</div>
      <div class="progress-stack" id="progressStack"></div>
      <div class="legend" id="legend"></div>
    </div>

    <div id="ticketsContainer"></div>
  </div>
</div>

<script>
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.onclick = () => fileInput.click();
  fileInput.onchange = (e) => { if(e.target.files[0]) processPDF(e.target.files[0]); };

  async function processPDF(file) {
    const reader = new FileReader();
    reader.onload = async function() {
      const typedarray = new Uint8Array(this.result);
      const pdf = await pdfjsLib.getDocument(typedarray).promise;
      let fullText = "";
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        fullText += content.items.map(item => item.str).join(' ') + " \n";
      }
      analyzeTickets(fullText);
    };
    reader.readAsArrayBuffer(file);
  }

  function analyzeTickets(text) {
    // Normalisation pour éviter les coupures de mots
    const cleanText = text.replace(/\s+/g, ' ');
    
    // On sépare par ticket (TIC-X-XXXXXX)
    const ticketBlocks = cleanText.split(/(?=\d{2}\/\d{2}\/\d{4}\s+TIC)/);
    
    let stats = { cb: 0, cash: 0, total: 0, tcg: 0, jds: 0, puz: 0, acc: 0 };
    const tickets = [];

    ticketBlocks.forEach(block => {
      if(!block.includes('TIC-')) return;

      const ticket = {
        date: block.match(/\d{2}\/\d{2}\/\d{4}/)?.[0] || "",
        vendeur: block.match(/Trignol Robin|Employé\s\w+/)?.[0] || "Inconnu",
        id: block.match(/TIC-\d+-\d+/)?.[0] || "",
        items: [],
        paiement: block.includes('Carte Bancaire') ? 'CB' : (block.includes('Espèces') ? 'Espèces' : 'Autre'),
        totalTTC: parseFloat(block.match(/Total Document\s?:\s?([\d,.]+)/)?.[1]?.replace(',', '.') || 0)
      };

      // Extraction des produits dans ce bloc
      const itemRegex = /([A-Z0-9-]{4,})\s+(.*?)\s+x\s+(\d+)\s+([\d,.]+)/g;
      let itemMatch;
      while ((itemMatch = itemRegex.exec(block)) !== null) {
        const ref = itemMatch[1];
        const name = itemMatch[2].trim();
        const qty = parseInt(itemMatch[3]);
        const priceTTC = parseFloat(itemMatch[4].replace(',', '.')) * 1.20;
        const subtotal = priceTTC * qty;

        ticket.items.push({ ref, name, qty, subtotal });

        // Classification
        if (ref.match(/^(OP|PK|LOR|YGO|MTG|SW)/)) stats.tcg += subtotal;
        else if (ref.match(/^(PUZ|EDU)/)) stats.puz += subtotal;
        else if (ref.match(/^(ACC|PROT)/)) stats.acc += subtotal;
        else stats.jds += subtotal;
      }

      if(ticket.paiement === 'CB') stats.cb += ticket.totalTTC;
      else if(ticket.paiement === 'Espèces') stats.cash += ticket.totalTTC;
      
      stats.total += ticket.totalTTC;
      tickets.push(ticket);
    });

    renderUI(tickets, stats);
  }

  function renderUI(tickets, stats) {
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('totalCB').textContent = stats.cb.toFixed(2) + " €";
    document.getElementById('totalCash').textContent = stats.cash.toFixed(2) + " €";
    document.getElementById('totalGlobal').textContent = stats.total.toFixed(2) + " €";

    // Barre de répartition
    const categories = [
      { label: 'TCG', val: stats.tcg, color: 'var(--tcg)' },
      { label: 'Jeux', val: stats.jds, color: 'var(--jds)' },
      { label: 'Puzzles', val: stats.puz, color: 'var(--puz)' },
      { label: 'Accessoires', val: stats.acc, color: 'var(--acc)' }
    ];

    const stack = document.getElementById('progressStack');
    const legend = document.getElementById('legend');
    stack.innerHTML = ''; legend.innerHTML = '';

    categories.forEach(cat => {
      const percent = (cat.val / (stats.total || 1)) * 100;
      if(percent > 0) {
        stack.innerHTML += `<div class="progress-bar" style="width: ${percent}%; background: ${cat.color}"></div>`;
        legend.innerHTML += `
          <div class="legend-item">
            <div class="dot" style="background: ${cat.color}"></div>
            <span style="font-weight:600">${cat.label}</span>
            <span style="color:var(--muted)">${percent.toFixed(1)}%</span>
          </div>`;
      }
    });

    // Liste des tickets
    const container = document.getElementById('ticketsContainer');
    container.innerHTML = '<div class="stat-label" style="margin-bottom:1rem">Détail des Transactions</div>';
    
    tickets.reverse().forEach(t => {
      const badgeClass = t.paiement === 'CB' ? 'badge-cb' : 'badge-cash';
      container.innerHTML += `
        <div class="ticket-card">
          <div class="ticket-header">
            <span><strong>${t.date}</strong> — ${t.id}</span>
            <span>Vendeur : <strong>${t.vendeur}</strong></span>
            <span class="badge ${badgeClass}">${t.paiement}</span>
          </div>
          <div class="ticket-body">
            ${t.items.map(i => `
              <div class="item-row">
                <span class="item-ref">${i.ref}</span>
                <span class="item-name">${i.name} <strong>x${i.qty}</strong></span>
                <span style="font-family: 'JetBrains Mono'">${i.subtotal.toFixed(2)}€</span>
              </div>
            `).join('')}
            <div style="text-align:right; margin-top:0.5rem; padding-top:0.5rem; border-top:1px solid var(--border); font-weight:700">
              Total Ticket : ${t.totalTTC.toFixed(2)} €
            </div>
          </div>
        </div>`;
    });
  }
</script>
</body>
</html>
