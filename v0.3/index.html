<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyse Journal de Caisse — Le Donjon de la Guilde</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0e1015;
    --surface: #1a1c23;
    --surface2: #242731;
    --border: #2d313d;
    --text: #eef0f5;
    --muted: #8e94a5;
    --primary: #f2a900; /* Couleur Or pour le Donjon */
    --accent: #4a9fd4;
    --success: #4ade80;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    margin: 0;
    padding: 2rem;
    line-height: 1.5;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.5rem;
    margin-bottom: 2rem;
    color: var(--primary);
  }

  .upload-zone {
    border: 2px dashed var(--border);
    padding: 3rem;
    text-align: center;
    border-radius: 16px;
    background: var(--surface);
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 2rem;
  }

  .upload-zone:hover {
    border-color: var(--primary);
    background: var(--surface2);
  }

  .dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    padding: 1.5rem;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .stat-label {
    color: var(--muted);
    font-size: 0.875rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 1.75rem;
    font-weight: 500;
    margin-top: 0.5rem;
    color: var(--primary);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border-radius: 12px;
    overflow: hidden;
    margin-top: 1rem;
  }

  th {
    text-align: left;
    padding: 1rem;
    background: var(--surface2);
    color: var(--muted);
    font-weight: 500;
    font-size: 0.875rem;
  }

  td {
    padding: 1rem;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
  }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="container">
  <h1>Le Donjon de la Guilde — Analyse de Caisse</h1>
  
  <div class="upload-zone" id="dropZone">
    <p>Glissez le PDF du journal de caisse ici ou cliquez pour parcourir</p>
    <input type="file" id="fileInput" class="hidden" accept=".pdf">
  </div>

  <div id="results" class="hidden">
    <div class="dashboard">
      <div class="stat-card">
        <div class="stat-label">Chiffre d'Affaires (TTC)</div>
        <div id="totalTTC" class="stat-value">0,00 €</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ventes TCG (Cartes)</div>
        <div id="totalTCG" class="stat-value">0,00 €</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ventes Jeux & Autres</div>
        <div id="totalMisc" class="stat-value">0,00 €</div>
      </div>
    </div>

    <table id="ventesTable">
      <thead>
        <tr>
          <th>Référence</th>
          <th>Article</th>
          <th>Quantité</th>
          <th>Total TTC</th>
        </tr>
      </thead>
      <tbody id="ventesBody"></tbody>
    </table>
  </div>
</div>

<script>
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.onclick = () => fileInput.click();
  
  fileInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (file) processPDF(file);
  };

  async function processPDF(file) {
    const reader = new FileReader();
    reader.onload = async function() {
      const typedarray = new Uint8Array(this.result);
      const pdf = await pdfjsLib.getDocument(typedarray).promise;
      let fullText = "";

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        fullText += content.items.map(item => item.str).join(' ') + "\n";
      }
      
      parseData(fullText);
    };
    reader.readAsArrayBuffer(file);
  }

  function parseData(text) {
    // Nettoyage global du texte pour supprimer les sauts de ligne excessifs et normaliser les espaces
    const cleanText = text.replace(/\s+/g, ' ');
    
    const sales = [];
    let totalTTC = 0;
    let totalTCG = 0;

    // Regex améliorée pour capturer : Référence [Espace] Nom de l'article [x Quantité] [Prix]
    // Cette regex cherche des motifs type "OP12BOFR One Piece... x 1 5,83"
    const saleRegex = /([A-Z0-9-]{4,})\s+(.*?)\s+x\s+(\d+)\s+([\d,.]+)/g;
    
    let match;
    while ((match = saleRegex.exec(cleanText)) !== null) {
      const ref = match[1];
      const name = match[2];
      const qty = parseInt(match[3]);
      const price = parseFloat(match[4].replace(',', '.'));
      
      const totalItem = price * 1.2; // Calcul approximatif TTC si le prix est HT dans le log

      sales.push({ ref, name, qty, total: totalItem });

      // Catégorisation TCG (ex: One Piece, Pokémon, Lorcana via préfixes)
      if (ref.startsWith('OP') || ref.startsWith('PK') || ref.startsWith('LOR')) {
        totalTCG += totalItem;
      }
      totalTTC += totalItem;
    }

    displayResults(sales, totalTTC, totalTCG);
  }

  function displayResults(sales, totalTTC, totalTCG) {
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('totalTTC').textContent = totalTTC.toFixed(2).replace('.', ',') + ' €';
    document.getElementById('totalTCG').textContent = totalTCG.toFixed(2).replace('.', ',') + ' €';
    document.getElementById('totalMisc').textContent = (totalTTC - totalTCG).toFixed(2).replace('.', ',') + ' €';

    const body = document.getElementById('ventesBody');
    body.innerHTML = '';
    sales.forEach(s => {
      const row = `<tr>
        <td>${s.ref}</td>
        <td>${s.name}</td>
        <td>${s.qty}</td>
        <td>${s.total.toFixed(2)} €</td>
      </tr>`;
      body.innerHTML += row;
    });
  }
</script>
</body>
</html>
