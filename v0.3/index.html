<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyse Journal de Caisse — Les Gentlemen du Jeu</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --surface2: #1e2029;
    --border: #2a2d3a;
    --text: #e8e9f0;
    --muted: #7a7d8f;
    --primary: #4a9fd4; /* Bleu Gentlemen du Jeu */
    --tcg: #e8643a;
    --success: #4ade80;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    margin: 0;
    padding: 2rem;
    line-height: 1.5;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 3rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1rem;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    margin: 0;
    color: var(--text);
  }

  .subtitle {
    color: var(--primary);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 0.8rem;
  }

  .upload-zone {
    border: 2px dashed var(--border);
    padding: 4rem 2rem;
    text-align: center;
    border-radius: 16px;
    background: var(--surface);
    cursor: pointer;
    transition: all 0.3s ease;
    margin-bottom: 2rem;
  }

  .upload-zone:hover {
    border-color: var(--primary);
    background: var(--surface2);
  }

  .dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    padding: 1.5rem;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  .stat-label {
    color: var(--muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    font-weight: 600;
  }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 1.8rem;
    font-weight: 500;
    margin-top: 0.5rem;
    color: var(--text);
  }

  .stat-value.highlight { color: var(--primary); }
  .stat-value.tcg { color: var(--tcg); }

  .table-container {
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }

  th {
    text-align: left;
    padding: 1rem;
    background: var(--surface2);
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.7rem;
  }

  td {
    padding: 1rem;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
  }

  tr:hover { background: rgba(255,255,255,0.02); }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="subtitle">Outil d'Analyse Interne</div>
    <h1>Les Gentlemen du Jeu</h1>
  </header>
  
  <div class="upload-zone" id="dropZone">
    <p>Glissez le PDF du journal de caisse ici</p>
    <p style="font-size: 0.8rem; color: var(--muted);">Ou cliquez pour sélectionner un fichier</p>
    <input type="file" id="fileInput" class="hidden" accept=".pdf">
  </div>

  <div id="results" class="hidden">
    <div class="dashboard">
      <div class="stat-card">
        <div class="stat-label">Chiffre d'Affaires Global</div>
        <div id="totalTTC" class="stat-value highlight">0,00 €</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ventes TCG</div>
        <div id="totalTCG" class="stat-value tcg">0,00 €</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ventes Jeux / Divers</div>
        <div id="totalMisc" class="stat-value">0,00 €</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Articles Vendus</div>
        <div id="totalQty" class="stat-value">0</div>
      </div>
    </div>

    <div class="table-container">
      <table id="ventesTable">
        <thead>
          <tr>
            <th>Référence</th>
            <th>Désignation Article</th>
            <th style="text-align: center;">Qté</th>
            <th style="text-align: right;">Total TTC</th>
          </tr>
        </thead>
        <tbody id="ventesBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.onclick = () => fileInput.click();
  
  fileInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (file) processPDF(file);
  };

  async function processPDF(file) {
    const reader = new FileReader();
    reader.onload = async function() {
      const typedarray = new Uint8Array(this.result);
      const pdf = await pdfjsLib.getDocument(typedarray).promise;
      let fullText = "";

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        // On remplace les sauts de ligne par des espaces pour simplifier la Regex
        fullText += content.items.map(item => item.str).join(' ') + " \n";
      }
      
      parseExtractionData(fullText);
    };
    reader.readAsArrayBuffer(file);
  }

  function parseExtractionData(text) {
    // Nettoyage : On normalise les espaces et on traite les virgules décimales
    const cleanText = text.replace(/\s+/g, ' ');
    
    const sales = [];
    let totalTTC = 0;
    let totalTCG = 0;
    let totalQty = 0;

    // Cette Regex cible la structure spécifique de vos logs : 
    // [REFERENCE] [Nom de l'article] x [Quantité] [Prix HT]
    // Exemple : OP12BOFR One Piece ... x 1 5,833333
    const saleRegex = /([A-Z0-9-]{4,})\s+(.*?)\s+x\s+(\d+)\s+([\d,.]+)/g;
    
    let match;
    while ((match = saleRegex.exec(cleanText)) !== null) {
      const ref = match[1];
      const name = match[2].trim();
      const qty = parseInt(match[3]);
      // Le prix dans le log est HT, on convertit en TTC (20%)
      const priceHT = parseFloat(match[4].replace(',', '.'));
      const priceTTC = priceHT * 1.20; 
      const totalItemTTC = priceTTC * qty;

      sales.push({ ref, name, qty, total: totalItemTTC });

      // Logique de tri TCG (One Piece, Lorcana, etc.)
      if (ref.startsWith('OP') || ref.startsWith('LOR') || ref.startsWith('PKM') || name.toUpperCase().includes('ONE PIECE')) {
        totalTCG += totalItemTTC;
      }
      
      totalTTC += totalItemTTC;
      totalQty += qty;
    }

    // Extraction spécifique du mode de paiement si nécessaire (optionnel)
    // On peut aussi chercher "Total Document : 21,90" pour vérifier
    
    displayResults(sales, totalTTC, totalTCG, totalQty);
  }

  function displayResults(sales, totalTTC, totalTCG, totalQty) {
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('totalTTC').textContent = totalTTC.toLocaleString('fr-FR', {style: 'currency', currency: 'EUR'});
    document.getElementById('totalTCG').textContent = totalTCG.toLocaleString('fr-FR', {style: 'currency', currency: 'EUR'});
    document.getElementById('totalMisc').textContent = (totalTTC - totalTCG).toLocaleString('fr-FR', {style: 'currency', currency: 'EUR'});
    document.getElementById('totalQty').textContent = totalQty;

    const body = document.getElementById('ventesBody');
    body.innerHTML = '';
    
    // On trie par montant décroissant pour la vue
    sales.sort((a, b) => b.total - a.total).forEach(s => {
      const row = `<tr>
        <td style="color: var(--muted)">${s.ref}</td>
        <td>${s.name}</td>
        <td style="text-align: center;">${s.qty}</td>
        <td style="text-align: right; font-weight: 500;">${s.total.toFixed(2)} €</td>
      </tr>`;
      body.innerHTML += row;
    });
  }
</script>
</body>
</html>
